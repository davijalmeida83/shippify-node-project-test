name: CI - Testes Automatizados
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
      - name: Instalar dependências
        run: npm install --legacy-peer-deps
      - name: Executar testes
        run: npm test
      - name: Gerar relatório de cobertura
        run: npm run test:coverage
      - name: Verificar arquivo de cobertura
        run: |
          if [ -f ./coverage/lcov.info ]; then
            echo "✅ Arquivo lcov.info encontrado"
            ls -lh ./coverage/
          else
            echo "❌ Arquivo lcov.info NÃO encontrado"
            find . -name "lcov.info" -o -name "coverage-final.json"
            exit 1
          fi
      - name: Publicar relatório de cobertura
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
          dry_run: false
          comment: true
          comment_mode: "always"
          pr_comments_enabled: true

      - name: Gerar sumário de coverage como comentário no PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-final.json', 'utf8'));
            let totalLines = 0, coveredLines = 0, totalFunctions = 0, coveredFunctions = 0, totalBranches = 0, coveredBranches = 0;
            for (const file in coverage) {
              const fileCov = coverage[file];
              if (fileCov.lines) Object.values(fileCov.lines).forEach(line => { totalLines++; if (line > 0) coveredLines++; });
              if (fileCov.functions) Object.values(fileCov.functions).forEach(fn => { totalFunctions++; if (fn > 0) coveredFunctions++; });
              if (fileCov.branches) Object.values(fileCov.branches).forEach(branch => { totalBranches++; if (branch > 0) coveredBranches++; });
            }
            const linesCov = totalLines > 0 ? ((coveredLines / totalLines) * 100).toFixed(2) : 0;
            const fnCov = totalFunctions > 0 ? ((coveredFunctions / totalFunctions) * 100).toFixed(2) : 0;
            const brCov = totalBranches > 0 ? ((coveredBranches / totalBranches) * 100).toFixed(2) : 0;
            const msg = `## 📊 Cobertura de Testes\n\n| Métrica | Cobertura |\n|---------|----------|\n| Linhas | ${linesCov}% |\n| Funções | ${fnCov}% |\n| Ramos | ${brCov}% |\n\n✅ Testes OK!`;
            await github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: msg });

      - name: Verificar vulnerabilidades
        run: npm audit --audit-level=high
