name: CI - Testes Automatizados
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
      - name: Instalar dependências
        run: npm install --legacy-peer-deps
      - name: Executar testes
        run: npm test
      - name: Gerar relatório de cobertura
        run: npm run test:coverage
      - name: Verificar arquivo de cobertura
        run: |
          if [ -f ./coverage/lcov.info ]; then
            echo "✅ Arquivo lcov.info encontrado"
            ls -lh ./coverage/
          else
            echo "❌ Arquivo lcov.info NÃO encontrado"
            find . -name "lcov.info" -o -name "coverage-final.json"
            exit 1
          fi
      - name: Publicar relatório de cobertura
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
          dry_run: false
          comment: true
          comment_mode: "always"
          pr_comments_enabled: true
      - name: Verificar vulnerabilidades
        run: npm audit --audit-level=high
