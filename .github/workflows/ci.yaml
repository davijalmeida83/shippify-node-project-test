name: CI - Testes Automatizados
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
      - name: Instalar dependências
        run: npm install --legacy-peer-deps
      - name: Executar testes
        run: npm test
      - name: Gerar relatório de cobertura
        run: npm run test:coverage
      - name: Verificar arquivo de cobertura
        run: |
          if [ -f ./coverage/lcov.info ]; then
            echo "✅ Arquivo lcov.info encontrado"
            ls -lh ./coverage/
          else
            echo "❌ Arquivo lcov.info NÃO encontrado"
            find . -name "lcov.info" -o -name "coverage-final.json"
            exit 1
          fi
      - name: Publicar relatório de cobertura
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
          dry_run: false
          comment: true
          comment_mode: "always"
          pr_comments_enabled: true

      - name: Gerar sumário de coverage como comentário no PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-final.json', 'utf8'));
            let totalLines = 0, coveredLines = 0, totalFunctions = 0, coveredFunctions = 0, totalBranches = 0, coveredBranches = 0;
            const filesCoverage = [];
            for (const file in coverage) {
              if (!file.includes('middleware') && !file.includes('utils') && !file.includes('services')) continue;
              const fileCov = coverage[file];
              let fileLines = 0, fileCoveredLines = 0, fileFunctions = 0, fileCoveredFunctions = 0, fileBranches = 0, fileCoveredBranches = 0;
              if (fileCov.lines) Object.values(fileCov.lines).forEach(line => { fileLines++; totalLines++; if (line > 0) { fileCoveredLines++; coveredLines++; } });
              if (fileCov.functions) Object.values(fileCov.functions).forEach(fn => { fileFunctions++; totalFunctions++; if (fn > 0) { fileCoveredFunctions++; coveredFunctions++; } });
              if (fileCov.branches) Object.values(fileCov.branches).forEach(branch => { fileBranches++; totalBranches++; if (branch > 0) { fileCoveredBranches++; coveredBranches++; } });
              const fname = file.replace(process.cwd() + '/', '').replace(/\\/g, '/');
              const linePct = fileLines > 0 ? ((fileCoveredLines / fileLines) * 100).toFixed(0) : '0';
              filesCoverage.push({ file: fname, lines: `${linePct}% (${fileCoveredLines}/${fileLines})`, functions: `${fileFunctions > 0 ? ((fileCoveredFunctions / fileFunctions) * 100).toFixed(0) : '0'}%`, branches: `${fileBranches > 0 ? ((fileCoveredBranches / fileBranches) * 100).toFixed(0) : '0'}%` });
            }
            let filesTable = '| Arquivo | Linhas | Funções | Ramos |\n|---------|--------|---------|-------|\n';
            filesCoverage.sort((a, b) => a.file.localeCompare(b.file)).forEach(f => { filesTable += `| ${f.file} | ${f.lines} | ${f.functions} | ${f.branches} |\n`; });
            const msg = `## 📊 Cobertura de Testes (Middlewares, Utils, Services)\n\n${filesTable}`;
            await github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: msg });

      - name: Verificar vulnerabilidades
        run: npm audit --audit-level=high
