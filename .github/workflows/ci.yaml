name: CI - Testes Automatizados
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
      - name: Instalar dependências
        run: npm install --legacy-peer-deps
      - name: Executar testes
        run: npm test
      - name: Gerar relatório de cobertura
        run: npm run test:coverage
      - name: Verificar arquivo de cobertura
        run: |
          if [ -f ./coverage/lcov.info ]; then
            echo "✅ Arquivo lcov.info encontrado"
            ls -lh ./coverage/
          else
            echo "❌ Arquivo lcov.info NÃO encontrado"
            find . -name "lcov.info" -o -name "coverage-final.json"
            exit 1
          fi
      - name: Publicar relatório de cobertura
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
          dry_run: false
          comment: true
          comment_mode: "always"
          pr_comments_enabled: true

      - name: Gerar sumário de coverage como comentário no PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-final.json', 'utf8'));
            const filesCoverage = {};
            for (const filePath in coverage) {
              if (!filePath.includes('middleware') && !filePath.includes('utils') && !filePath.includes('services')) continue;
              const c = coverage[filePath];
              const relPath = filePath.replace(/\\src\\/g, 'src/').replace(/\\\\/g, '/');
              const fname = relPath.split('/src/')[1];
              const stmtTotal = Object.keys(c.s).length;
              const stmtCov = Object.values(c.s).filter(v => v > 0).length;
              const fnTotal = Object.keys(c.f).length;
              const fnCov = Object.values(c.f).filter(v => v > 0).length;
              const brTotal = Object.values(c.b).reduce((t, arr) => t + arr.length, 0);
              const brCov = Object.values(c.b).reduce((t, arr) => t + arr.filter(v => v > 0).length, 0);
              const lineTotal = Object.keys(c.s).length;
              const lineCov = Object.values(c.s).filter(v => v > 0).length;
              filesCoverage[fname] = { statements: `${stmtTotal > 0 ? ((stmtCov / stmtTotal) * 100).toFixed(0) : '0'}% (${stmtCov}/${stmtTotal})`, branches: `${brTotal > 0 ? ((brCov / brTotal) * 100).toFixed(0) : '0'}% (${brCov}/${brTotal})`, functions: `${fnTotal > 0 ? ((fnCov / fnTotal) * 100).toFixed(0) : '0'}% (${fnCov}/${fnTotal})`, lines: `${lineTotal > 0 ? ((lineCov / lineTotal) * 100).toFixed(0) : '0'}% (${lineCov}/${lineTotal})` };
            }
            const grouped = { services: [], middleware: [], utils: [] };
            for (const file in filesCoverage) {
              if (file.includes('services')) grouped.services.push([file, filesCoverage[file]]);
              else if (file.includes('middleware')) grouped.middleware.push([file, filesCoverage[file]]);
              else if (file.includes('utils')) grouped.utils.push([file, filesCoverage[file]]);
            }
            let table = '## 📊 Cobertura de Testes (Middlewares, Utils, Services)\n\n';
            const order = ['services', 'middleware', 'utils'];
            order.forEach(type => {
              grouped[type].sort((a, b) => a[0].localeCompare(b[0]));
              if (grouped[type].length > 0) {
                table += `### ${type === 'services' ? '🔧 Services' : type === 'middleware' ? '🛣️ Middlewares' : '🧰 Utils'}\n\n| Arquivo | Statements | Branches | Functions | Lines |\n|---------|------------|----------|-----------|-------|\n`;
                grouped[type].forEach(([f, c]) => { table += `| ${f} | ${c.statements} | ${c.branches} | ${c.functions} | ${c.lines} |\n`; });
                table += '\n';
              }
            });
            await github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: table });

      - name: Verificar vulnerabilidades
        run: npm audit --audit-level=high
