name: CI - Testes Automatizados
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
      - name: Instalar dependências
        run: npm install --legacy-peer-deps
      - name: Executar testes
        run: npm test
      - name: Gerar relatório de cobertura
        run: npm run test:coverage
      - name: Verificar arquivo de cobertura
        run: |
          if [ -f ./coverage/lcov.info ]; then
            echo "✅ Arquivo lcov.info encontrado"
            ls -lh ./coverage/
          else
            echo "❌ Arquivo lcov.info NÃO encontrado"
            find . -name "lcov.info" -o -name "coverage-final.json"
            exit 1
          fi
      - name: Publicar relatório de cobertura
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
          dry_run: false
          comment: true
          comment_mode: "always"
          pr_comments_enabled: true

      - name: Gerar sumário de coverage como comentário no PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-final.json', 'utf8'));
            let totalStmt = 0, covStmt = 0, totalLines = 0, covLines = 0, totalFunctions = 0, covFunctions = 0, totalBranches = 0, covBranches = 0;
            const filesCoverage = [];
            for (const file in coverage) {
              if (!file.includes('middleware') && !file.includes('utils') && !file.includes('services')) continue;
              const c = coverage[file];
              let stmtTotal = 0, stmtCov = 0, lineTotal = 0, lineCov = 0, fnTotal = 0, fnCov = 0, brTotal = 0, brCov = 0;
              if (c.statements) Object.values(c.statements).forEach(s => { stmtTotal++; totalStmt++; if (s > 0) { stmtCov++; covStmt++; } });
              if (c.lines) Object.values(c.lines).forEach(l => { lineTotal++; totalLines++; if (l > 0) { lineCov++; covLines++; } });
              if (c.functions) Object.values(c.functions).forEach(f => { fnTotal++; totalFunctions++; if (f > 0) { fnCov++; covFunctions++; } });
              if (c.branches) Object.values(c.branches).forEach(b => { brTotal++; totalBranches++; if (b > 0) { brCov++; covBranches++; } });
              const fname = file.replace(process.cwd() + '/', '').replace(/\\/g, '/');
              const stmtPct = stmtTotal > 0 ? ((stmtCov / stmtTotal) * 100).toFixed(0) : '0';
              const linePct = lineTotal > 0 ? ((lineCov / lineTotal) * 100).toFixed(0) : '0';
              const fnPct = fnTotal > 0 ? ((fnCov / fnTotal) * 100).toFixed(0) : '0';
              const brPct = brTotal > 0 ? ((brCov / brTotal) * 100).toFixed(0) : '0';
              filesCoverage.push({ file: fname, statements: `${stmtPct}% (${stmtCov}/${stmtTotal})`, branches: `${brPct}% (${brCov}/${brTotal})`, functions: `${fnPct}% (${fnCov}/${fnTotal})`, lines: `${linePct}% (${lineCov}/${lineTotal})` });
            }
            let filesTable = '| Arquivo | Statements | Branches | Functions | Lines |\n|---------|------------|----------|-----------|-------|\n';
            filesCoverage.sort((a, b) => a.file.localeCompare(b.file)).forEach(f => { filesTable += `| ${f.file} | ${f.statements} | ${f.branches} | ${f.functions} | ${f.lines} |\n`; });
            const msg = `## 📊 Cobertura de Testes (Middlewares, Utils, Services)\n\n${filesTable}`;
            await github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: msg });

      - name: Verificar vulnerabilidades
        run: npm audit --audit-level=high
